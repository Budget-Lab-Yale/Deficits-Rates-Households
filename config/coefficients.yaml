# Published elasticities and loan parameters for Laubach-framework tracker
# All coefficients from the literature — NOT re-estimated here.

# bp change in long-term rate per 1 pp change in projected debt/GDP
elasticity:
  preferred: 2.0       # Neveu & Schafer (2024, CBO WP 2024-05)
  low: 1.5             # Furceri, Goncalves & Li (2025, IMF WP 25/142, Table 2 T10)
  high: 3.0            # Plante, Richter & Zubairy (2025, Dallas Fed WP 2513)

# ~75% of the fiscal effect flows through the term premium (Plante et al.)
term_premium_share: 0.75

# Pass-through from 10yr Treasury to consumer rates
# Mortgage: ~1:1 with 10yr Treasury (regression beta 1.022, R² 0.89)
# Auto: benchmarked to 5yr Treasury; dampened by shorter duration and
#   nonbank lending share (~55%). Range 0.50-0.75.
# Small business: prime-linked (fed funds + 3%); only the ~25% expected-short-rate
#   channel of the fiscal effect reaches prime.
passthrough:
  mortgage_30yr: 1.0
  auto: 0.50
  small_business: 0.25

# Loan parameters (late November 2025 vintage, matching CBO data cutoff).
# Source strings below are the live reference trail for these assumptions.
loans:
  mortgage:
    label: "Home Mortgage (30 year)"
    principal: 329840     # FRED HOSMEDUSM052N Sep 2025 median $412,300 less 20% down
    term_months: 360
    baseline_rate_pct: 6.23
    source: "FRED HOSMEDUSM052N Sep 2025, Freddie Mac PMMS Nov 26 2025"
  auto:
    label: "Auto Loan (5½ year)"
    principal: 42332      # Experian State of Auto Finance Q3 2025
    term_months: 67
    baseline_rate_pct: 7.51
    source: "Experian Q3 2025, FRED TERMCBAUTO48NS Q3 2025"
  small_business:
    label: "Small Business Loan (10 year)"
    principal: 476800     # Rounded from FY2025 SBA 7(a) implied average ($37.0B / 77,600 = $476,804)
    term_months: 120
    baseline_rate_pct: 10.00
    source: "SBA FY2025 7(a) lending release, FRED DPRIME Nov 2025 + 3.00 pp spread assumption"
