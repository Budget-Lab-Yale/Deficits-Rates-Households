# Runtime configuration for Deficits-Rates-Households pipeline

# CBO data source mode
# - eval_csv_primary: use eval-projections CSV inputs + latest Excel append
# - excel_legacy: parse all historical Excel decomposition/econ files
cbo_data_source: "eval_csv_primary"

# Projection horizon settings
# Window is fiscal years t+window_start_offset through
# t+window_start_offset+projection_horizon-1.
projection_horizon: 10
window_start_offset: 0
# Maximum allowed lag between budget vintage and matched econ vintage
max_econ_lag_days: 365

# CSV-primary inputs (relative to repo root)
cbo_eval_dir: "input/eval_csv"
cbo_eval_baselines_csv: "input/eval_csv/baselines.csv"
cbo_eval_changes_csv: "input/eval_csv/baseline_changes.csv"

# Existing GDP-vintage table used for denominator matching in the 2015+ sample.
# If missing, auto-generated from Economic Projections Excel files in cbo_econ_dir.
cbo_gdp_vintage_csv: "input/eval_csv/cbo_gdp_vintages.csv"

# CSV sample and latest Excel append
csv_sample_start_vintage: "2015-08-01"
append_latest_excel: true
latest_excel_append_vintage: "2026-02-01"

# Local CBO Excel files (relative to repo root)
cbo_budget_dir: "input/budget_projections"
cbo_econ_dir: "input/economic_projections"

# Data storage root (relative to repo root)
data_root: "../Data"

# Interface name for Budget Lab data convention
interface: "Deficits-Rates-Households"
version: "v1"

# Cumulative legislative impact scenarios
scenarios:
  since_2015:
    start_vintage: "2015-08-01"
    label: "Since 2015"
  since_2022:
    start_vintage: "2022-05-01"
    label: "Since 2022"

# Output settings
output_dir: "output"
chart_width: 10
chart_height: 6
chart_dpi: 300
